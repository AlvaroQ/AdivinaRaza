name: iosApp
options:
  bundleIdPrefix: com.alvaroquintana
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Development"
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": "x86_64"
    ONLY_ACTIVE_ARCH: "YES"
    FRAMEWORK_SEARCH_PATHS:
      - "$(SRCROOT)/../app/build/bin/$(KOTLIN_NATIVE_TARGET)/debugFramework"
    KOTLIN_NATIVE_TARGET: "iosSimulatorArm64"
    OTHER_LDFLAGS:
      - "-framework"
      - "AdivinaRazaShared"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
          - "GoogleService-Info.plist"
    resources:
      - path: iosApp/Assets.xcassets
      - path: iosApp/GoogleService-Info.plist
        optional: true
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: AdivinaRaza
        CFBundleShortVersionString: "3.0.2"
        CFBundleVersion: "34"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        CADisableMinimumFrameDurationOnPhone: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserTrackingUsageDescription: >-
          We use this identifier to deliver personalized ads inside the
          AdivinaRaza game.
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alvaroquintana.adivinaperro
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_OBJC_BRIDGING_HEADER: ""
    preBuildScripts:
      - name: Build Kotlin Multiplatform Framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :app:linkDebugFrameworkIosSimulatorArm64
        outputFiles:
          - $(SRCROOT)/../app/build/bin/iosSimulatorArm64/debugFramework/AdivinaRazaShared.framework/AdivinaRazaShared
        basedOnDependencyAnalysis: false
    dependencies:
      - framework: ../app/build/bin/iosSimulatorArm64/debugFramework/AdivinaRazaShared.framework
        embed: false
        codeSign: false
